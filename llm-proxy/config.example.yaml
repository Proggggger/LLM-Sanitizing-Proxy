# LLM Proxy Configuration
# Copy this file to config.yaml and configure your providers

server:
  host: "0.0.0.0"
  port: 8000
  debug: false

# Provider configurations
providers:
  openai:
    enabled: true
    api_key: "${OPENAI_API_KEY}"  # or use env variable
    base_url: "https://api.openai.com/v1"
    models:
      - "gpt-4-turbo-preview"
      - "gpt-3.5-turbo"
    timeout: 60
    retry_count: 3

  anthropic:
    enabled: true
    api_key: "${ANTHROPIC_API_KEY}"
    base_url: "https://api.anthropic.com"
    models:
      - "claude-3-opus-20240229"
      - "claude-3-sonnet-20240229"
      - "claude-3-haiku-20240307"
    timeout: 60
    retry_count: 3

  google:
    enabled: false
    api_key: "${GOOGLE_API_KEY}"
    base_url: "https://generativelanguage.googleapis.com/v1beta"
    models:
      - "gemini-pro"
      - "gemini-1.5-pro"
    timeout: 60
    retry_count: 3

  ollama:
    enabled: true
    base_url: "http://localhost:11434"
    models:
      - "llama3"
      - "mistral"
      - "mixtral"
    timeout: 120
    retry_count: 2

# Routing rules (processed in order)
routing:
  # Route by model name pattern
  - name: "openai-gpt4"
    condition:
      model_pattern: "gpt-4.*"
    provider: "openai"
    priority: 10

  - name: "anthropic-claude"
    condition:
      model_pattern: "claude-.*"
    provider: "anthropic"
    priority: 10

  - name: "google-gemini"
    condition:
      model_pattern: "gemini-.*"
    provider: "google"
    priority: 10

  - name: "ollama-local"
    condition:
      model_pattern: "llama.*|mistral.*|mixtral.*"
    provider: "ollama"
    priority: 10

  # Default fallback
  - name: "default"
    condition:
      default: true
    provider: "openai"
    priority: 1

# Load balancing strategies: round-robin, random, least-requests
load_balancing:
  strategy: "round-robin"
  health_check_interval: 30  # seconds

# Rate limiting
rate_limiting:
  enabled: false
  requests_per_minute: 60
  burst: 10

# Caching
caching:
  enabled: false
  ttl: 3600  # seconds
  max_size: 1000

# Logging
logging:
  level: "INFO"
  format: "json"
  include_body: true
  include_headers: false
